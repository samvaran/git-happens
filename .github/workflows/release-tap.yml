# After a release is published: update the Homebrew tap Formula (version + sha256 of source tarball).
# Requires: repo secret TAP_PAT (token with write access to the tap repo).
# Optional: repo variable TAP_REPO (e.g. "owner/homebrew-git-happens"). Defaults to "{owner}/homebrew-git-happens".
# If TAP_PAT is not set, the workflow fails at the first step with a clear message.
name: Update homebrew tap manually

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to update in tap (e.g. 0.0.1); only used when run manually"
        required: true
        type: string

jobs:
  tap:
    runs-on: ubuntu-latest
    steps:
      - name: Require TAP_PAT
        env:
          TAP_PAT: ${{ secrets.TAP_PAT }}
        run: |
          if [ -z "$TAP_PAT" ]; then
            echo "::error::TAP_PAT secret is not set. Add it in repo Settings → Secrets and variables → Actions to enable tap updates."
            exit 1
          fi

      - name: Set version and tarball URL
        id: meta
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="v${{ github.event.inputs.version }}"
          fi
          VERSION="${TAG#v}"
          TARBALL_URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tarball_url=${TARBALL_URL}" >> $GITHUB_OUTPUT

      - name: Get source tarball SHA256
        id: sha
        run: |
          SHA256=$(curl -sL "${{ steps.meta.outputs.tarball_url }}" | shasum -a 256 | awk '{print $1}')
          echo "sha256=${SHA256}" >> $GITHUB_OUTPUT

      - name: Clone tap and update Formula
        env:
          TAP_REPO: ${{ vars.TAP_REPO }}
          TAP_PAT: ${{ secrets.TAP_PAT }}
          VERSION: ${{ steps.meta.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          TAP_REPO="${TAP_REPO:-$GITHUB_REPOSITORY_OWNER/homebrew-git-happens}"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git clone "https://x-access-token:${TAP_PAT}@github.com/${TAP_REPO}.git" tap
          cd tap

          FORMULA="Formula/git-happens.rb"
          if [ ! -f "$FORMULA" ]; then
            echo "::error::Formula not found: $FORMULA. Create it from docs/homebrew/Formula-git-happens.rb"
            exit 1
          fi

          sed -i.bak "s/version \".*\"/version \"${VERSION}\"/" "$FORMULA"
          sed -i.bak "s/sha256 \".*\"/sha256 \"${SHA256}\"/" "$FORMULA"
          rm -f "${FORMULA}.bak"

          if git diff --quiet; then
            echo "No Formula changes (version/sha256 already up to date)."
            exit 0
          fi

          git add "$FORMULA"
          git commit -m "git-happens ${VERSION}"
          git push origin HEAD
          echo "::notice::Tap updated: ${TAP_REPO} Formula/git-happens.rb -> v${VERSION}"
