# Optional: run from Actions tab to release without touching the command line.
# Enter a version (e.g. 1.2.3) or patch|minor|major. This workflow bumps, commits, tags, and pushes;
# the Release workflow then builds and publishes; release-tap updates Homebrew if configured.
name: Prepare release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.2.3) or bump type (patch, minor, major)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: denoland/setup-deno@v2
        with:
          deno-version: "v2.x"

      - name: Bump version
        run: deno run --allow-read --allow-write scripts/bump.ts "${{ github.event.inputs.version }}"

      - name: Read version
        id: ver
        run: echo "version=$(jq -r .version deno.json)" >> $GITHUB_OUTPUT

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deno.json src/version.ts
          git commit -m "Release v${{ steps.ver.outputs.version }}" || true
          git tag "v${{ steps.ver.outputs.version }}"

      - name: Push branch and tag
        run: |
          git push origin HEAD
          git push origin "v${{ steps.ver.outputs.version }}"
