# CI: lint and format check on push and PRs.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: "v2.x"

      - name: Lint
        run: deno lint

      - name: Format check
        run: deno fmt --check
